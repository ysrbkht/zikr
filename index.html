<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اذکار حرفه‌ای</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c6b9e">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Persian font for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* فونت‌های آپلود شده */
        @font-face {
            font-family: 'Compset';
            src: url('/zikr/fonts/Compset-Bold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }
        @font-face {
            font-family: 'Traditional Arabic';
            src: url('/zikr/fonts/TraditionalArabicBold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }
        @font-face {
            font-family: 'Uthman Taha';
            src: url('/zikr/fonts/UthmanTahaNaskhBold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }
        @font-face {
            font-family: 'Lotus';
            src: url('/zikr/fonts/lotus-Bold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }

        /* متغیرهای پیش‌فرض */
        :root {
            --bg-color: #f0f7ff;
            --container-bg: #ffffff;
            --text-color: #1e3a5f;
            --card-bg: #f8fcff;
            --card-border: #d0e2f2;
            --meta-bg: #e6f0fa;
            --badge-bg: #c2dbf0;
            --badge-color: #1a4b77;
            --footer-text: #4d7294;
            --icon-color: #2c6b9e;
            --switch-bg: #c2d6e8;
            --scrollbar-thumb: #9fb8d0;
            --scrollbar-track: #e2ecf5;
            --selected-font: 'Compset', 'Traditional Arabic', 'Amiri', serif;
            --selected-font-size: 1.6rem;
        }

        body.dark {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #e2e8f0;
            --card-bg: #334155;
            --card-border: #475569;
            --meta-bg: #1e293b;
            --badge-bg: #1e3a8a;
            --badge-color: #ffffff;
            --footer-text: #94a3b8;
            --icon-color: #ffffff;
            --switch-bg: #475569;
            --scrollbar-thumb: #475569;
            --scrollbar-track: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }
        .app-container {
            width: 100%;
            background: var(--container-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.3s;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.02);
        }
        .main-content {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .detail-active .main-content {
            padding: 0;
        }

        /* هدر اصلی (فقط در منو) */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header.hidden { display: none; }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2c6b9e;
            margin-bottom: 0.2rem;
        }
        .dark .header h1 {
            color: #aac3e0;
        }
        .header p {
            color: var(--footer-text);
            font-size: 1rem;
        }

        /* آیکون تنظیمات */
        .settings-wrapper {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 30;
        }
        .settings-icon {
            font-size: 2rem;
            color: var(--icon-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .settings-icon:hover {
            transform: rotate(90deg);
        }

        /* پنل تنظیمات حرفه‌ای */
        .settings-panel {
            position: absolute;
            top: 3.5rem;
            left: 0;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 1.2rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            display: none;
            min-width: 260px;
            z-index: 40;
            backdrop-filter: blur(5px);
        }
        .settings-panel.show {
            display: block;
        }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }
        .setting-item:last-child {
            margin-bottom: 0;
        }
        .setting-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            color: var(--text-color);
        }
        .setting-label i {
            font-size: 1.2rem;
            color: var(--icon-color);
            width: 1.5rem;
        }

        /* سوئیچ داخلی */
        .inner-switch {
            width: 50px;
            height: 24px;
            background: var(--switch-bg);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: none;
        }
        .inner-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }
        .inner-switch.active {
            background: #1e3a8a;
        }
        .inner-switch.active::after {
            left: calc(100% - 22px);
        }

        /* کنترل اندازه فونت */
        .font-size-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .font-size-btn {
            background: var(--meta-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-color);
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .font-size-btn:hover {
            background: var(--badge-bg);
        }
        .font-size-value {
            min-width: 45px;
            text-align: center;
            font-weight: 500;
        }

        /* dropdown انتخاب فونت */
        .font-select {
            background: var(--meta-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: var(--text-color);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            width: 140px;
        }
        .font-select option {
            background: var(--container-bg);
        }

        /* منوی اصلی */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1rem;
        }
        .menu-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-align: center;
        }
        .menu-card:hover {
            transform: scale(1.01);
            border-color: #b0c4de;
            box-shadow: 0 12px 20px rgba(0,0,0,0.05);
        }
        .menu-info h2 {
            font-size: 1.9rem;
            font-weight: 600;
            color: var(--text-color);
        }
        .menu-icon {
            font-size: 3rem;
            color: var(--icon-color);
            opacity: 0.9;
        }

        /* صفحه جزئیات */
        .detail-view {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
        }
        .detail-view.active {
            display: flex;
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.5rem 1rem;
            background: var(--container-bg);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-color);
            padding: 0.2rem 0.2rem 0.2rem 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .back-btn:hover {
            color: #1e3a8a;
        }
        .detail-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
            line-height: 1.3;
        }

        /* لیست اذکار */
        .dhikr-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }
        .dhikr-list::-webkit-scrollbar {
            width: 8px;
        }
        .dhikr-list::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 10px;
        }
        .dhikr-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }
        .dhikr-list::-webkit-scrollbar-thumb:hover {
            background: #7f9ab3;
        }
        @media (max-width: 768px) {
            .dhikr-list::-webkit-scrollbar {
                width: 0;
                background: transparent;
            }
            .dhikr-list {
                scrollbar-width: none;
            }
        }

        .dhikr-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 1rem;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            margin-bottom: 1rem;
        }
        .dhikr-text {
            font-family: var(--selected-font);
            font-weight: bold;
            font-size: var(--selected-font-size);
            line-height: 2.4rem;
            margin-bottom: 0.6rem;
            color: var(--text-color);
            text-align: center;  /* وسط‌چین */
        }
        .dhikr-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
            justify-content: space-between;
            border-top: 1px dashed var(--card-border);
            padding-top: 0.5rem;
        }
        .repeat-badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .repeat-badge i {
            font-size: 0.9rem;
        }
        .reference {
            color: var(--footer-text);
            background: var(--meta-bg);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            flex-direction: row;
        }
        .reference i {
            margin-left: 0.3rem;
            margin-right: 0;
        }

        /* فوتر (فقط در منوی اصلی) */
        .footer {
            text-align: center;
            color: var(--footer-text);
            font-size: 0.9rem;
            margin-top: auto;
            border-top: 1px solid var(--card-border);
            padding: 1.2rem 1rem 0.5rem;
        }
        .footer.hidden {
            display: none;
        }
        .telegram-link {
            color: #2c6b9e;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        .dark .telegram-link {
            color: #90caf9;
        }
        .telegram-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- تنظیمات (چرخ‌دنده) با پنل بازشو -->
        <div class="settings-wrapper">
            <i class="fas fa-cog settings-icon" id="settingsIcon"></i>
            <div class="settings-panel" id="settingsPanel">
                <!-- حالت شب/روز -->
                <div class="setting-item">
                    <span class="setting-label"><i class="fas fa-moon"></i> حالت شب</span>
                    <div class="inner-switch" id="themeSwitchInner"></div>
                </div>
                <!-- اندازه فونت -->
                <div class="setting-item">
                    <span class="setting-label"><i class="fas fa-text-height"></i> اندازه متن</span>
                    <div class="font-size-control">
                        <span class="font-size-btn" id="decreaseFont">−</span>
                        <span class="font-size-value" id="fontSizeValue">1.6</span>
                        <span class="font-size-btn" id="increaseFont">+</span>
                    </div>
                </div>
                <!-- انتخاب فونت -->
                <div class="setting-item">
                    <span class="setting-label"><i class="fas fa-font"></i> قلم</span>
                    <select class="font-select" id="fontSelect">
                        <option value="Compset">قلم کامپوست</option>
                        <option value="Traditional">قلم عربی سنتی</option>
                        <option value="Uthman">قلم عثمان طه</option>
                        <option value="Lotus">قلم لوتوس</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="main-content" id="mainContent">
            <!-- هدر اصلی با متن جدید و بدون آیکون ماه -->
            <div class="header" id="header">
                <h1>اذکار صحیح روزانه</h1>
                <p style="color: var(--footer-text);">هر زمان، هر مکان</p>
            </div>

            <!-- منوی اصلی -->
            <div id="mainMenu" class="main-menu">
                <div class="menu-grid">
                    <div class="menu-card" data-category="morning">
                        <div class="menu-icon"><i class="fas fa-sun"></i></div>
                        <div class="menu-info"><h2>اذکار صبح</h2></div>
                    </div>
                    <div class="menu-card" data-category="evening">
                        <div class="menu-icon"><i class="fas fa-moon"></i></div>
                        <div class="menu-info"><h2>اذکار شام</h2></div>
                    </div>
                    <div class="menu-card" data-category="sleep">
                        <div class="menu-icon"><i class="fas fa-bed"></i></div>
                        <div class="menu-info"><h2>اذکار خواب</h2></div>
                    </div>
                </div>
            </div>

            <!-- صفحه جزئیات (مخفی در ابتدا) -->
            <div id="detailView" class="detail-view">
                <div class="detail-header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i></button>
                    <span class="detail-title" id="detailCategoryTitle"></span>
                </div>
                <div id="detailList" class="dhikr-list"></div>
            </div>

            <!-- فوتر (فقط در منوی اصلی) -->
            <div class="footer" id="footer">
                <a href="https://t.me/YBAKHTIAR" target="_blank" class="telegram-link">
                    <svg class="telegram-svg" viewBox="0 0 24 24">
                        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.87 4.326-2.96-.924c-.643-.2-.658-.643.135-.953l11.56-4.456c.537-.2 1.006.133.832.936z"/>
                    </svg>
                    نظرات و پیشنهادات
                </a>
            </div>
        </div> <!-- main-content -->
    </div> <!-- app-container -->

    <script>
        const JSON_URL = 'https://raw.githubusercontent.com/ysrbkht/zikr/main/azkar.json';
        let azkarData = null;
        const appContainer = document.getElementById('appContainer');
        const mainMenu = document.getElementById('mainMenu');
        const detailView = document.getElementById('detailView');
        const detailList = document.getElementById('detailList');
        const detailCategoryTitle = document.getElementById('detailCategoryTitle');
        const backBtn = document.getElementById('backBtn');
        const header = document.getElementById('header');
        const footer = document.getElementById('footer');
        const mainContent = document.getElementById('mainContent');
        const categoryNames = {
            morning: 'اذکار صبح',
            evening: 'اذکار شام',
            sleep: 'اذکار خواب'
        };

        // عناصر تنظیمات
        const settingsIcon = document.getElementById('settingsIcon');
        const settingsPanel = document.getElementById('settingsPanel');
        const themeSwitchInner = document.getElementById('themeSwitchInner');
        const decreaseFont = document.getElementById('decreaseFont');
        const increaseFont = document.getElementById('increaseFont');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const fontSelect = document.getElementById('fontSelect');

        // متغیرهای تنظیمات
        let currentFontSize = 1.6; // rem
        let currentFont = 'Compset'; // پیش‌فرض

        // ======== توابع کمکی ========
        function applyFontSize(size) {
            document.documentElement.style.setProperty('--selected-font-size', size + 'rem');
            fontSizeValue.textContent = size.toFixed(1);
        }

        function applyFontFamily(fontKey) {
            let fontStack = '';
            switch (fontKey) {
                case 'Compset':
                    fontStack = "'Compset', 'Traditional Arabic', 'Amiri', serif";
                    break;
                case 'Traditional':
                    fontStack = "'Traditional Arabic', 'Amiri', serif";
                    break;
                case 'Uthman':
                    fontStack = "'Uthman Taha', 'Traditional Arabic', 'Amiri', serif";
                    break;
                case 'Lotus':
                    fontStack = "'Lotus', 'Traditional Arabic', 'Amiri', serif";
                    break;
                default:
                    fontStack = "'Compset', 'Traditional Arabic', 'Amiri', serif";
            }
            document.documentElement.style.setProperty('--selected-font', fontStack);
        }

        // ======== تنظیمات پنل ========
        settingsIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && !settingsIcon.contains(e.target)) {
                settingsPanel.classList.remove('show');
            }
        });

        // حالت شب
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeSwitchInner.classList.add('active');
            }
        }
        themeSwitchInner.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            themeSwitchInner.classList.toggle('active');
            const theme = document.body.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
        });

        // اندازه فونت
        decreaseFont.addEventListener('click', () => {
            currentFontSize = Math.max(1.0, currentFontSize - 0.1);
            applyFontSize(currentFontSize);
            localStorage.setItem('fontSize', currentFontSize.toFixed(1));
        });
        increaseFont.addEventListener('click', () => {
            currentFontSize = Math.min(2.5, currentFontSize + 0.1);
            applyFontSize(currentFontSize);
            localStorage.setItem('fontSize', currentFontSize.toFixed(1));
        });

        // انتخاب فونت
        fontSelect.addEventListener('change', (e) => {
            currentFont = e.target.value;
            applyFontFamily(currentFont);
            localStorage.setItem('fontFamily', currentFont);
        });

        // بارگذاری تنظیمات ذخیره شده
        function loadSettings() {
            const savedFontSize = localStorage.getItem('fontSize');
            if (savedFontSize) {
                currentFontSize = parseFloat(savedFontSize);
                applyFontSize(currentFontSize);
            } else {
                applyFontSize(1.6);
            }

            const savedFont = localStorage.getItem('fontFamily');
            if (savedFont && ['Compset', 'Traditional', 'Uthman', 'Lotus'].includes(savedFont)) {
                currentFont = savedFont;
                fontSelect.value = savedFont;
                applyFontFamily(savedFont);
            } else {
                fontSelect.value = 'Compset';
                applyFontFamily('Compset');
            }
        }

        // ======== نمایش منو و جزئیات ========
        function showMainMenu() {
            mainMenu.style.display = 'block';
            detailView.classList.remove('active');
            header.classList.remove('hidden');
            footer.classList.remove('hidden');
            appContainer.classList.remove('detail-active');
        }

        function showCategory(category) {
            if (!azkarData || !azkarData[category]) {
                detailList.innerHTML = `<div style="text-align:center; padding:2rem;">داده‌ای یافت نشد.</div>`;
                return;
            }
            detailCategoryTitle.textContent = categoryNames[category] || category;
            const items = azkarData[category];
            let html = '';
            items.forEach(item => {
                html += `
                    <div class="dhikr-card">
                        <div class="dhikr-text">${item.text}</div>
                        <div class="dhikr-meta">
                            <span class="repeat-badge"><i class="fas fa-star"></i> ${item.repeat} مرتبه</span>
                            <span class="reference"><i class="fas fa-book-open"></i> ${item.reference || 'منبع'}</span>
                        </div>
                    </div>
                `;
            });
            detailList.innerHTML = html;
            detailList.scrollTop = 0;

            mainMenu.style.display = 'none';
            detailView.classList.add('active');
            header.classList.add('hidden');
            footer.classList.add('hidden');
            appContainer.classList.add('detail-active');
        }

        document.querySelectorAll('.menu-card').forEach(card => {
            card.addEventListener('click', () => {
                const cat = card.dataset.category;
                if (cat) showCategory(cat);
            });
        });

        backBtn.addEventListener('click', showMainMenu);

        async function loadAzkar() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error('خطا در دریافت اطلاعات');
                azkarData = await response.json();
            } catch (error) {
                console.error(error);
                alert('امکان بارگیری اذکار وجود ندارد. لطفاً اتصال اینترنت را بررسی کنید.');
            }
        }

        // شروع کار
        loadAzkar();
        showMainMenu();
        initTheme();
        loadSettings();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
