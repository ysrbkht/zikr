<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الأذكار</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="512x512" href="/zikr/icon.png">
    <link rel="apple-touch-icon" href="/zikr/icon.png">
    <meta name="theme-color" content="#6366f1" id="themeColor">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ===== فونت‌های آپلود شده ===== */
        @font-face {
            font-family: 'Uthman Taha';
            src: url('/zikr/fonts/UthmanTahaNaskhBold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }
        @font-face {
            font-family: 'Lotus';
            src: url('/zikr/fonts/lotus-Bold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }
        @font-face {
            font-family: 'Compset';
            src: url('/zikr/fonts/Compset-Bold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }

        /* ===== تم مدرن (پیش‌فرض) ===== */
        :root {
            --bg-color: #f3f4f6;
            --container-bg: transparent;
            --text-color: #1e293b;
            --card-bg: rgba(255, 245, 230, 0.9);
            --card-border: 1px solid rgba(255,255,255,0.3);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --meta-bg: #f1f5f9;
            --badge-bg: rgba(99,102,241,0.1);
            --badge-color: #6366f1;
            --footer-text: #64748b;
            --icon-color: #6366f1;
            --switch-bg: #cbd5e1;
            --scrollbar-thumb: #cbd5e1;
            --scrollbar-track: transparent;
            --selected-font: 'Uthman Taha', 'Lotus', 'Compset', 'Amiri', serif;
            --selected-font-size: 1.4rem;
            --player-bg: #f1f5f9;
            --player-btn-bg: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --player-btn-color: white;
            --player-progress-bg: rgba(0,0,0,0.1);
            --player-progress-fill: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --player-time-color: #64748b;
            --header-bg: rgba(255, 255, 255, 0.8);
            --header-shadow: 0 4px 20px rgba(0,0,0,0.03);
            --modal-bg: white;
            --completed-color: #10b981;
            --progress-bg: #e2e8f0;
            --progress-fill: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(45, 212, 191, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* حالت تاریک مدرن */
        body.dark {
            --bg-color: #020617;
            --container-bg: transparent;
            --text-color: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: 1px solid rgba(255,255,255,0.1);
            --meta-bg: #334155;
            --badge-bg: rgba(99,102,241,0.2);
            --badge-color: #818cf8;
            --footer-text: #94a3b8;
            --icon-color: #818cf8;
            --switch-bg: #475569;
            --scrollbar-thumb: #475569;
            --player-bg: #1e293b;
            --player-progress-bg: rgba(255,255,255,0.1);
            --player-time-color: #94a3b8;
            --header-bg: rgba(15, 23, 42, 0.8);
            --modal-bg: #1e293b;
            --completed-color: #4ade80;
            --progress-bg: #334155;
            --progress-fill: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.2) 0px, transparent 50%);
        }

        /* ===== استایل‌های پایه ===== */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        [dir="ltr"] body {
            font-family: 'Segoe UI', 'Vazirmatn', sans-serif;
        }
        .app-container {
            width: 100%;
            height: 100%;
            background: var(--container-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.3s;
            overflow: hidden;
        }

        /* ===== آیکون تنظیمات ===== */
        .settings-float {
            position: absolute;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 100;
            font-size: 2.2rem;
            color: var(--icon-color);
            cursor: pointer;
            transition: transform 0.2s ease;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 30%;
            border: var(--card-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 0;
        }
        [dir="ltr"] .settings-float {
            left: auto;
            right: 1.2rem;
        }
        .settings-float:hover {
            transform: rotate(90deg) scale(1.1);
        }
        .settings-float:active {
            transform: rotate(90deg) scale(0.95);
        }

        /* ===== پنل تنظیمات ===== */
        .settings-panel {
            position: absolute;
            top: 5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 1.2rem;
            box-shadow: var(--card-shadow);
            display: none;
            min-width: 280px;
            z-index: 200;
            backdrop-filter: blur(10px);
            width: auto;
            left: 1.2rem;
            max-width: 400px;
        }
        [dir="ltr"] .settings-panel {
            left: auto;
            right: 1.2rem;
        }
        .settings-panel.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @media (max-width: 600px) {
            .settings-panel {
                left: 1.2rem !important;
                right: 1.2rem !important;
                max-width: none !important;
            }
            [dir="ltr"] .settings-panel {
                left: 1.2rem !important;
                right: 1.2rem !important;
            }
        }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
        }
        .setting-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .setting-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            color: var(--text-color);
        }
        .setting-label i {
            font-size: 1.2rem;
            color: var(--icon-color);
            width: 1.5rem;
        }
        .select-wrapper {
            position: relative;
            width: 150px;
        }
        .custom-select {
            width: 100%;
            background: var(--meta-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 0.5rem 1rem;
            color: var(--text-color);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: left 10px center;
            background-size: 16px;
            padding-left: 35px;
            text-align: right;
        }
        body.dark .custom-select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23818cf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
        }
        [dir="ltr"] .custom-select {
            text-align: left;
            padding-left: 1rem;
            padding-right: 35px;
            background-position: right 10px center;
        }
        .inner-switch {
            width: 50px;
            height: 24px;
            background: var(--switch-bg);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .inner-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }
        .inner-switch.active {
            background: #1e3a8a;
        }
        .inner-switch.active::after {
            left: calc(100% - 22px);
        }
        .font-size-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .font-size-btn {
            background: var(--meta-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-color);
            font-size: 1.2rem;
            transition: transform 0.2s, background 0.2s;
        }
        .font-size-value {
            min-width: 45px;
            text-align: center;
            font-weight: 500;
        }
        .install-btn {
            background: var(--player-btn-bg);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .hidden-btn {
            display: none !important;
        }

        /* ===== منوی اصلی ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .main-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 0.5rem 1.5rem 0 1.5rem;
        }
        .menu-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .main-menu .app-title {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            text-align: center;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }
        .menu-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem 1rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .menu-card:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--icon-color);
        }
        .menu-card:active {
            transform: scale(0.98);
        }
        .menu-info h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
        }
        .menu-icon {
            background: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            font-size: 2rem;
            color: var(--icon-color);
        }
        body.dark .menu-icon {
            background: #1e293b;
            color: #818cf8;
        }

        /* ===== هدر جزئیات ===== */
        .detail-header {
            display: none;
            align-items: center;
            gap: 1rem;
            padding: 0.7rem 1.4rem 0.85rem;
            background: var(--header-bg);
            backdrop-filter: blur(24px);
            border-radius: 0 0 20px 20px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .detail-header.active {
            display: flex;
            animation: headerReveal 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes headerReveal {
            0% { opacity: 0; transform: translateY(-100%); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .detail-header .back-btn {
            background: var(--meta-bg);
            border: 1px solid var(--card-border);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--icon-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-header .page-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
            flex: 1;
        }

        /* ===== لیست اذکار ===== */
        .dhikr-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scrollbar-width: thin;
        }
        .dhikr-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--card-border);
            box-shadow: 0 6px 12px rgba(0,0,0,0.03);
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        .dhikr-text {
            font-family: var(--selected-font);
            font-weight: bold;
            font-size: var(--selected-font-size);
            line-height: 1.8;
            margin-bottom: 1rem;
            color: var(--text-color);
            text-align: center;
        }
        .dhikr-meta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            border-top: 1px dashed var(--card-border);
            padding-top: 0.8rem;
        }
        .repeat-badge, .completed-badge {
            background: var(--badge-bg);
            color: var(--badge-color);
            padding: 0.4rem 3rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, color 0.2s;
            user-select: none;
            text-align: center;
            min-width: 270px;
            justify-content: center;
        }
        .repeat-badge i, .completed-badge i {
            font-size: 1rem;
        }
        .repeat-badge:hover {
            transform: scale(1);
            background: var(--badge-color);
            color: white !important;
        }
        .repeat-badge:active {
            transform: scale(0.95);
        }
        .completed-badge {
            background: var(--completed-color);
            color: white;
            cursor: default;
            pointer-events: none;
        }
        .reference {
            color: var(--footer-text);
            background: var(--meta-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            direction: ltr;
        }
        [dir="rtl"] .reference {
            direction: rtl;
        }

        /* ===== صفحه صوتی ===== */
        .audio-detail {
            padding: 1rem;
            flex: 1;
            overflow-y: auto;
        }
        .audio-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--card-border);
            margin-bottom: 1rem;
        }
        .audio-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .custom-audio-player {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--player-bg);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            direction: ltr;
        }
        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--player-btn-bg);
            border: none;
            color: var(--player-btn-color);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .progress-area {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .time {
            font-size: 0.8rem;
            color: var(--player-time-color);
            min-width: 45px;
            text-align: center;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: var(--player-progress-bg);
            border-radius: 10px;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--player-progress-fill);
            border-radius: 10px;
        }
        audio {
            display: none;
        }
        .download-audio-btn {
            background: var(--player-btn-bg);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .download-audio-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* ===== فوتر ===== */
        .footer {
            text-align: center;
            color: var(--footer-text);
            font-size: 0.9rem;
            border-top: 1px solid var(--card-border);
            padding: 0.8rem;
            background: var(--container-bg);
            flex-shrink: 0;
        }
        .footer.hidden {
            display: none;
        }
        .telegram-link {
            color: var(--icon-color);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        .telegram-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ===== مودال ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-card {
            background: var(--modal-bg);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-btn {
            padding: 0.7rem 2rem;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            background: var(--meta-bg);
            color: var(--text-color);
            border: 1px solid var(--card-border);
        }
        .modal-btn.primary {
            background: var(--player-btn-bg);
            color: white;
            border: none;
        }
        .progress-modal .modal-card {
            max-width: 350px;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill-bar {
            height: 100%;
            width: 0%;
            background: var(--progress-fill);
            transition: width 0.2s ease;
            border-radius: 10px;
        }
        .progress-percent {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--icon-color);
            margin: 0.5rem 0;
        }
        .download-progress-text {
            font-size: 0.9rem;
            color: var(--footer-text);
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <i class="fas fa-cog settings-float" id="settingsIcon"></i>
    <div class="settings-panel" id="settingsPanel">
        <div class="setting-item">
            <span class="setting-label"><i class="fas fa-globe"></i> <span data-i18n="language">اللغة</span></span>
            <div class="select-wrapper"><select class="custom-select" id="languageSelect"><option value="fa">فارسی</option><option value="ar" selected>العربية</option><option value="en">English</option></select></div>
        </div>
        <div class="setting-item">
            <span class="setting-label"><i class="fas fa-moon"></i> <span data-i18n="darkMode">الوضع الليلي</span></span>
            <div class="inner-switch" id="themeSwitchInner"></div>
        </div>
        <div class="setting-item">
            <span class="setting-label"><i class="fas fa-text-height"></i> <span data-i18n="fontSize">حجم الخط</span></span>
            <div class="font-size-control"><span class="font-size-btn" id="decreaseFont">−</span><span class="font-size-value" id="fontSizeValue">1.4</span><span class="font-size-btn" id="increaseFont">+</span></div>
        </div>
        <div class="setting-item">
            <span class="setting-label"><i class="fas fa-font"></i> <span data-i18n="font">الخط</span></span>
            <div class="select-wrapper"><select class="custom-select" id="fontSelect"><option value="Uthman">عثمان طه</option><option value="Lotus">لوتوس</option><option value="Compset">كومبست</option></select></div>
        </div>

    function formatTime(sec) { if (isNaN(sec)) return '00:00'; const m = Math.floor(sec/60), s = Math.floor(sec%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function updateProgress(id) { const a = id==='morning'?audioMorning:audioEvening; const cur=a.currentTime, dur=a.duration; if(dur>0){ progressFills[id].style.width = (cur/dur)*100+'%'; currentTimes[id].textContent=formatTime(cur); } }
    function resetPlayer(id) { if(progressIntervals[id]) clearInterval(progressIntervals[id]); isPlaying[id]=false; const btn=document.querySelector(`[data-id="${id}"] i`); if(btn) btn.className='fas fa-play'; const a=id==='morning'?audioMorning:audioEvening; a.pause(); a.currentTime=0; progressFills[id].style.width='0%'; currentTimes[id].textContent='00:00'; durationTimes[id].textContent='00:00'; }

    function applyFontSize(s) { document.documentElement.style.setProperty('--selected-font-size', s+'rem'); fontSizeValue.textContent=s.toFixed(1); }
    function applyFontFamily(k) { 
        let stack = k==='Uthman'?"'Uthman Taha', 'Lotus', 'Compset', 'Amiri', serif": k==='Lotus'?"'Lotus', 'Uthman Taha', 'Compset', 'Amiri', serif":"'Compset', 'Uthman Taha', 'Lotus', 'Amiri', serif"; 
        document.documentElement.style.setProperty('--selected-font', stack); 
    }

    function setLanguage(lang) {
        currentLanguage = lang;
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
        localStorage.setItem('language', lang);
        languageSelect.value = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.dataset.i18n; if(translations[lang][k]) el.textContent = translations[lang][k]; });
        document.getElementById('mainAppTitle').textContent = translations[lang].appName;
        if(detailView.style.display !== 'none') { const cat = detailPageTitle.dataset.category; if(cat && translations[lang][cat]) detailPageTitle.textContent = translations[lang][cat]; }
        else if(audioDetailView.style.display !== 'none') detailPageTitle.textContent = translations[lang].audioAdhkar;
        const fontOpts = fontSelect.querySelectorAll('option');
        fontOpts[0].textContent = translations[lang].fontUthman;
        fontOpts[1].textContent = translations[lang].fontLotus;
        fontOpts[2].textContent = translations[lang].fontCompset;

    function showModal(title, msg, type='info', callback) {
        modalTitle.textContent = title;
        modalMessage.textContent = msg;
        const iconMap = { success: '<i class="fas fa-check-circle"></i>', error: '<i class="fas fa-exclamation-circle"></i>', info: '<i class="fas fa-info-circle"></i>' };
        document.getElementById('modalIcon').innerHTML = iconMap[type] || iconMap.info;
        modalActions.innerHTML = '';
        const okBtn = document.createElement('button'); okBtn.className = 'modal-btn primary'; okBtn.textContent = translations[currentLanguage].ok; okBtn.onclick = () => { customModal.classList.remove('show'); if(callback) callback(); };
        modalActions.appendChild(okBtn);
        customModal.classList.add('show');
    }

    function showConfirmModal(title, msg, onConfirm) {
        modalTitle.textContent = title;
        modalMessage.textContent = msg;
        document.getElementById('modalIcon').innerHTML = '<i class="fas fa-question-circle"></i>';
        modalActions.innerHTML = '';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'modal-btn';
        cancelBtn.textContent = translations[currentLanguage].cancel;
        cancelBtn.onclick = () => customModal.classList.remove('show');
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'modal-btn primary';
        confirmBtn.textContent = translations[currentLanguage].confirm;
        confirmBtn.onclick = () => {
            customModal.classList.remove('show');
            onConfirm();
        };
        modalActions.appendChild(cancelBtn);
        modalActions.appendChild(confirmBtn);
        customModal.classList.add('show');
    }

    // ذخیره‌سازی شمارش‌ها در sessionStorage
    function getCountsKey(category) { return `counts_${category}`; }
    function loadCounts(category, defaultCounts) {
        const stored = sessionStorage.getItem(getCountsKey(category));
        if (stored) {
            try {
                const arr = JSON.parse(stored);
                if (Array.isArray(arr) && arr.length === defaultCounts.length) return arr;
            } catch(e) {}
        }
        return [...defaultCounts];
    }
    function saveCounts(category, counts) {
        sessionStorage.setItem(getCountsKey(category), JSON.stringify(counts));
    }

    function showCategory(cat, pushState=true) {
        if(cat === 'audio') {
            resetPlayer('morning'); resetPlayer('evening');
            mainMenu.style.display = 'none'; audioDetailView.style.display = 'flex'; detailView.style.display = 'none';
            footer.classList.add('hidden'); detailHeader.classList.add('active');
            detailPageTitle.textContent = translations[currentLanguage].audioAdhkar;
            detailPageTitle.dataset.category = 'audio';
            if(pushState) history.pushState({ page: 'detail', category: 'audio' }, '', '#audio');
            return;
        }
        if(!azkarData || !azkarData[cat]) { detailList.innerHTML = '<div style="text-align:center;padding:2rem;">'+translations[currentLanguage].source+'</div>'; return; }
        resetPlayer('morning'); resetPlayer('evening');
        detailPageTitle.textContent = translations[currentLanguage][cat] || cat;
        detailPageTitle.dataset.category = cat;
        detailHeader.classList.add('active');

        const items = azkarData[cat];
        const defaultCounts = items.map(item => item.repeat);
        let remainingCounts = loadCounts(cat, defaultCounts);

        let html = '';
        items.forEach((item, idx) => {
            let text = item.text;
            if(cat === 'sleep') {
                text = text.replace('دستان خود را جمع کنید و در آن بدمید و این سوره ها را بخوانید:', translations[currentLanguage].sleepStep1);
                text = text.replace('بعدا دستان خود را مسح کنید بر جسد خویش تا آنجاییکه توان دارید از سر و صورت خویش آغاز نمایید.(این کار را سه مرتبه تکرار نمایید)', translations[currentLanguage].sleepStep2);
                text = text.replace('سوره {الم سجدةِ} و {مُلك} را بخوانید', translations[currentLanguage].sleepSurah);
            }
            const remaining = remainingCounts[idx];
            const completed = remaining === 0;
            const badgeHtml = completed
                ? `<span class="completed-badge"><i class="fas fa-check-circle"></i> ${translations[currentLanguage].completed}</span>`
                : `<span class="repeat-badge" data-idx="${idx}"><i class="fas fa-repeat"></i> ${remaining} ${translations[currentLanguage].remaining}</span>`;
            // ترتیب: ابتدا مرجع، سپس دکمه
            html += `<div class="dhikr-card" data-idx="${idx}">
                        <div class="dhikr-text">${text}</div>
                        <div class="dhikr-meta">
                            <span class="reference"><i class="fas fa-book-open"></i> ${item.reference || translations[currentLanguage].source}</span>
                            ${badgeHtml}
                        </div>
                    </div>`;
        });
        detailList.innerHTML = html;

        document.querySelectorAll('.repeat-badge').forEach(badge => {
            badge.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(badge.dataset.idx);
                if (remainingCounts[idx] > 0) {
                    remainingCounts[idx]--;
                    saveCounts(cat, remainingCounts);
                    const card = badge.closest('.dhikr-card');
                    const metaDiv = card.querySelector('.dhikr-meta');
                    const newRemaining = remainingCounts[idx];
                    if (newRemaining === 0) {
                        const completedHtml = `<span class="completed-badge"><i class="fas fa-check-circle"></i> ${translations[currentLanguage].completed}</span>`;
                        const referenceSpan = metaDiv.querySelector('.reference');
                        // حفظ مرجع در بالا و قرار دادن دکمه تکمیل‌شده در پایین
                        metaDiv.innerHTML = (referenceSpan ? referenceSpan.outerHTML : '') + completedHtml;
                        const completedBadge = metaDiv.querySelector('.completed-badge');
                        if (completedBadge) {
                            completedBadge.style.transform = 'scale(1.2)';
                            setTimeout(() => { if(completedBadge) completedBadge.style.transform = ''; }, 200);
                        }
                    } else {
                        badge.innerHTML = `<i class="fas fa-repeat"></i> ${newRemaining} ${translations[currentLanguage].remaining}`;
                        badge.style.transform = 'scale(1.1)';
                        setTimeout(() => { badge.style.transform = ''; }, 150);
                    }
                }
            });
        });

        mainMenu.style.display = 'none'; detailView.style.display = 'flex'; audioDetailView.style.display = 'none';
        footer.classList.add('hidden');
        if(pushState) history.pushState({ page: 'detail', category: cat }, '', '#'+cat);
    }

    function showMainMenu() {

        history.pushState({ page: 'main' }, '', location.pathname);
    }

    async function loadAzkar() {
        try { const r = await fetch(JSON_URL); if(!r.ok) throw new Error(); azkarData = await r.json(); } 
        catch(e) { showModal('خطا', 'امکان بارگیری اذکار وجود ندارد.', 'error'); }
    }

    let downloadCanceled = false;
    async function downloadAudioFilesWithProgress() {
        downloadCanceled = false;
        progressFill.style.width = '0%';
        progressPercent.textContent = '0%';
        progressDetail.textContent = `0 / ${AUDIO_URLS.length} ملف`;
        progressTitle.textContent = translations[currentLanguage].downloadAudio || 'جاري التحميل...';
        progressModal.classList.add('show');
        const cache = await caches.open('azkar-audio-v1');
        let completed = 0;
        for (let i = 0; i < AUDIO_URLS.length; i++) {
            if (downloadCanceled) break;
            const url = AUDIO_URLS[i];
            try {
                const response = await fetch(url);
                if (response.ok) {
                    await cache.put(url, response);
                    completed++;
                }
            } catch (e) { console.warn('Download failed', url); }
            const percent = Math.floor((completed / AUDIO_URLS.length) * 100);
            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
            progressDetail.textContent = `${completed} / ${AUDIO_URLS.length} ملف`;
        }
        progressModal.classList.remove('show');
        if (downloadCanceled) return;
        if (completed === AUDIO_URLS.length) {
            localStorage.setItem('audioCached', 'true');
            if (downloadAudioBtn) downloadAudioBtn.style.display = 'none';
            showModal(translations[currentLanguage].downloadSuccess, translations[currentLanguage].downloadSuccess, 'success');
        } else {
            showModal(translations[currentLanguage].downloadFailed, translations[currentLanguage].downloadFailed, 'error');
        }
    }

    function initSettings() {
        let darkMode = localStorage.getItem('darkMode');
        if (darkMode === null) {
            darkMode = 'dark';
            localStorage.setItem('darkMode', 'dark');
        }
        if (darkMode === 'dark') {
            document.body.classList.add('dark');
            themeSwitchInner.classList.add('active');
        } else {
            document.body.classList.remove('dark');
            themeSwitchInner.classList.remove('active');
        }

        let savedFontSize = localStorage.getItem('fontSize');
        if (savedFontSize === null) {
            savedFontSize = '1.4';
            localStorage.setItem('fontSize', '1.4');
        }
        applyFontSize(parseFloat(savedFontSize));

        let savedFont = localStorage.getItem('fontFamily');
        if (savedFont === null) {
            savedFont = 'Uthman';
            localStorage.setItem('fontFamily', 'Uthman');
        }
        fontSelect.value = savedFont;
        applyFontFamily(savedFont);

        let savedLang = localStorage.getItem('language');
        if (savedLang === null) {
            savedLang = 'ar';
            localStorage.setItem('language', 'ar');
        }
        setLanguage(savedLang);

        if (localStorage.getItem('audioCached') === 'true' && downloadAudioBtn) {
            downloadAudioBtn.style.display = 'none';
        }
    }

    // Event listeners
    settingsIcon.onclick = (e) => { e.stopPropagation(); settingsPanel.classList.toggle('show'); };
    document.addEventListener('click', (e) => { if(!settingsPanel.contains(e.target) && !settingsIcon.contains(e.target)) settingsPanel.classList.remove('show'); });
    themeSwitchInner.onclick = () => { 
        document.body.classList.toggle('dark'); 
        themeSwitchInner.classList.toggle('active'); 
        localStorage.setItem('darkMode', document.body.classList.contains('dark')?'dark':'light'); 
    };
    decreaseFont.onclick = () => { let s = Math.max(1.0, (parseFloat(fontSizeValue.textContent)||1.4)-0.1); applyFontSize(s); localStorage.setItem('fontSize', s.toFixed(1)); };
    increaseFont.onclick = () => { let s = Math.min(2.2, (parseFloat(fontSizeValue.textContent)||1.4)+0.1); applyFontSize(s); localStorage.setItem('fontSize', s.toFixed(1)); };
    fontSelect.onchange = (e) => { applyFontFamily(e.target.value); localStorage.setItem('fontFamily', e.target.value); };
    languageSelect.onchange = (e) => setLanguage(e.target.value);
    backBtn.onclick = () => history.back();
    window.onpopstate = (e) => { if(e.state && e.state.page==='detail') showCategory(e.state.category, false); else showMainMenu(); };
    document.querySelectorAll('.menu-card').forEach(c => c.addEventListener('click', () => showCategory(c.dataset.category, true)));

    // Audio players
    playBtns.forEach(btn => btn.addEventListener('click', () => {
        const id = btn.dataset.id; const audio = id==='morning'?audioMorning:audioEvening; const icon = btn.querySelector('i');
        if(isPlaying[id]) { audio.pause(); icon.className = 'fas fa-play'; clearInterval(progressIntervals[id]); isPlaying[id]=false; }
        else { if(id==='morning' && isPlaying.evening) resetPlayer('evening'); if(id==='evening' && isPlaying.morning) resetPlayer('morning'); audio.play().catch(e=>console.log); icon.className='fas fa-pause'; progressIntervals[id]=setInterval(()=>updateProgress(id),100); isPlaying[id]=true; }
    }));
    audioMorning.addEventListener('loadedmetadata',()=>durationTimes.morning.textContent=formatTime(audioMorning.duration));
    audioEvening.addEventListener('loadedmetadata',()=>durationTimes.evening.textContent=formatTime(audioEvening.duration));
    audioMorning.addEventListener('ended',()=>resetPlayer('morning'));
    audioEvening.addEventListener('ended',()=>resetPlayer('evening'));
    progressBars.forEach(bar => bar.addEventListener('click', (e) => {
        const id = bar.dataset.progress; const audio = id==='morning'?audioMorning:audioEvening; if(audio.duration) { const rect=bar.getBoundingClientRect(); const percent=(e.clientX-rect.left)/rect.width; audio.currentTime=percent*audio.duration; updateProgress(id); }
    }));

    if (downloadAudioBtn) {
        downloadAudioBtn.addEventListener('click', () => {
            showConfirmModal(translations[currentLanguage].confirmDownloadTitle, translations[currentLanguage].confirmDownloadMsg, downloadAudioFilesWithProgress);
        });
    }
    if (cancelDownloadBtn) {
        cancelDownloadBtn.addEventListener('click', () => {
            downloadCanceled = true;
            progressModal.classList.remove('show');
        });
    }

    // PWA install
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt=e; if(!localStorage.getItem('appInstalled') && !window.matchMedia('(display-mode: standalone)').matches) installContainer.style.display='flex'; });
    installBtn.onclick = async () => { if(!deferredPrompt) return; deferredPrompt.prompt(); const {outcome}=await deferredPrompt.userChoice; if(outcome==='accepted') { localStorage.setItem('appInstalled','true'); installContainer.style.display='none'; } deferredPrompt=null; };
    if(localStorage.getItem('appInstalled') || window.matchMedia('(display-mode: standalone)').matches) installContainer.style.display='none';
    window.addEventListener('appinstalled', () => { localStorage.setItem('appInstalled','true'); installContainer.style.display='none'; });

    // Service worker
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(e=>console.log);

    loadAzkar().then(() => {
        initSettings();
        showMainMenu();
    }).catch(() => {
        initSettings();
        showMainMenu();
    });
</script>
</body>
</html>
